name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\CodexTldSaveEditor.sln

      - name: Build
        run: dotnet build .\CodexTldSaveEditor.sln -c Release --no-restore

      - name: Publish
        run: dotnet publish .\CodexTldSaveEditor.App\CodexTldSaveEditor.App.csproj -c Release -o .\artifacts\TheLongDarkSaveEditor --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheLongDarkSaveEditor
          path: .\artifacts\TheLongDarkSaveEditor
